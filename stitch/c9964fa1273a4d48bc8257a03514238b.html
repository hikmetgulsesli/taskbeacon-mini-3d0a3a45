<!DOCTYPE html>

<html lang="en"><head>

                        "inverse-primary": "#bec6e0",

<style>
        .flat-shadow {
            box-shadow: 0px 2px 0px 0px rgba(15, 23, 42, 0.05);
        }
        .form-input-focus:focus {
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col md:flex-row">
<!-- Mobile TopNavBar (Visible only on mobile) -->
<header class="md:hidden bg-surface dark:bg-on-surface border-b border-outline-variant dark:border-on-surface-variant fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-lg py-sm w-full">
<div class="font-display-sm text-display-sm font-bold text-primary dark:text-primary-fixed">TaskBeacon Mini</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container dark:hover:bg-primary-container transition-colors active:scale-95 duration-150 p-xs rounded">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="text-on-surface-variant dark:text-outline-variant hover:bg-surface-container dark:hover:bg-primary-container transition-colors active:scale-95 duration-150 p-xs rounded">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>
<!-- Desktop SideNavBar -->
<aside class="hidden md:flex flex-col h-screen fixed left-0 top-0 w-sidebar-width bg-surface-container-low dark:bg-tertiary-container border-r border-outline-variant dark:border-on-surface-variant z-40">
<div class="pt-xl pb-lg px-md flex-grow flex flex-col">
<div class="mb-xl flex items-center gap-md px-sm">
<div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-on-primary">
<span class="font-bold font-body-md text-body-md">PU</span>
</div>
<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface dark:text-on-surface-variant m-0">Workspace</h2>
<p class="font-label-xs text-label-xs text-on-surface-variant m-0">Production Unit A</p>
</div>
</div>
<button class="mb-xl w-full bg-primary text-on-primary py-sm px-md rounded flex justify-center items-center gap-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm">add</span>
<span class="font-label-md text-label-md">New Project</span>
</button>
<nav class="flex-grow space-y-xs">
<a class="flex items-center gap-md px-sm py-sm rounded-lg text-on-secondary-container dark:text-on-tertiary-container hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 ease-in-out bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary font-bold" href="#">
<span class="material-symbols-outlined" data-icon="assignment">assignment</span>
<span class="font-label-md text-label-md">Tasks</span>
</a>
<a class="flex items-center gap-md px-sm py-sm rounded-lg text-on-secondary-container dark:text-on-tertiary-container hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-md text-label-md">Timeline</span>
</a>
<a class="flex items-center gap-md px-sm py-sm rounded-lg text-on-secondary-container dark:text-on-tertiary-container hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
<span class="font-label-md text-label-md">Projects</span>
</a>
<a class="flex items-center gap-md px-sm py-sm rounded-lg text-on-secondary-container dark:text-on-tertiary-container hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label-md text-label-md">Reports</span>
</a>
</nav>
<div class="mt-auto space-y-xs border-t border-outline-variant pt-md">
<a class="flex items-center gap-md px-sm py-sm rounded-lg text-on-secondary-container dark:text-on-tertiary-container hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="help">help</span>
<span class="font-label-md text-label-md">Support</span>
</a>
<a class="flex items-center gap-md px-sm py-sm rounded-lg text-on-secondary-container dark:text-on-tertiary-container hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="archive">archive</span>
<span class="font-label-md text-label-md">Archive</span>
</a>
</div>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="flex-grow pt-16 md:pt-0 md:ml-[240px] p-md md:p-xl flex justify-center items-start">
<!-- Record Editor Form Card -->
<div class="w-full max-w-2xl bg-surface-container-lowest border border-surface-variant rounded-lg p-xl flat-shadow mt-md md:mt-xl">
<div class="flex items-center gap-md mb-xl border-b border-surface-variant pb-md">
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-xs rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div>
<h1 class="font-headline-sm text-headline-sm text-on-surface">Edit Record</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Task ID: #8492-B</p>
</div>
</div>
<form class="space-y-xl" id="recordForm">
<!-- Title Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="recordTitle">Title <span class="text-error">*</span></label>
<input aria-describedby="titleError" class="w-full bg-surface border border-outline-variant rounded p-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 form-input-focus transition-all" id="recordTitle" name="title" placeholder="Enter task title" required="" type="text"/>
<p class="font-label-xs text-label-xs text-error mt-xs hidden" id="titleError">Title is required.</p>
</div>
<!-- Description Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="recordDesc">Description</label>
<textarea class="w-full bg-surface border border-outline-variant rounded p-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 form-input-focus transition-all resize-y" id="recordDesc" name="description" placeholder="Detailed task description..." rows="4"></textarea>
</div>
<!-- Two Column Layout for Date & Status -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Due Date Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="dueDate">Due Date</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded p-sm font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 form-input-focus transition-all" id="dueDate" name="dueDate" type="date"/>
</div>
</div>
<!-- Status Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="taskStatus">Status</label>
<div class="relative">
<select class="w-full bg-surface border border-outline-variant rounded p-sm font-body-md text-body-md text-on-surface appearance-none focus:border-primary focus:ring-0 form-input-focus transition-all" id="taskStatus" name="status">
<option value="pending">Pending</option>
<option value="in-progress">In Progress</option>
<option value="done">Done</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface-variant">
<span class="material-symbols-outlined text-sm">arrow_drop_down</span>
</div>
</div>
</div>
</div>
<!-- Unsaved Changes Notice (Hidden by default) -->
<div class="hidden bg-surface-container flex items-center gap-sm p-sm rounded border border-surface-variant" id="unsavedNotice">
<span class="material-symbols-outlined text-on-surface-variant text-sm">info</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">You have unsaved changes.</span>
</div>
<!-- Action Buttons -->
<div class="flex justify-end gap-md pt-md border-t border-surface-variant mt-xl">
<button class="px-lg py-sm rounded border border-outline bg-surface text-on-surface font-label-md text-label-md hover:bg-surface-container transition-colors active:scale-95" id="cancelBtn" type="button">
                        Cancel
                    </button>
<button class="px-lg py-sm rounded bg-primary text-on-primary font-label-md text-label-md hover:opacity-90 transition-opacity active:scale-95" id="saveBtn" type="submit">
                        Save Record
                    </button>
</div>
</form>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('recordForm');
            const titleInput = document.getElementById('recordTitle');
            const titleError = document.getElementById('titleError');
            const unsavedNotice = document.getElementById('unsavedNotice');
            const inputs = form.querySelectorAll('input, textarea, select');
            let isDirty = false;

            // Track changes to show unsaved notice
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    if (!isDirty) {
                        isDirty = true;
                        unsavedNotice.classList.remove('hidden');
                    }
                    // Clear error when typing
                    if(input === titleInput && input.value.trim() !== '') {
                        titleInput.classList.remove('border-error');
                        titleError.classList.add('hidden');
                    }
                });
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let isValid = true;

                if (titleInput.value.trim() === '') {
                    titleInput.classList.add('border-error');
                    titleError.classList.remove('hidden');
                    isValid = false;
                }

                if (isValid) {
                    // Simulate save
                    const originalText = document.getElementById('saveBtn').innerText;
                    document.getElementById('saveBtn').innerText = 'Saving...';
                    document.getElementById('saveBtn').classList.add('opacity-50');
                    
                    setTimeout(() => {
                        document.getElementById('saveBtn').innerText = 'Saved';
                        isDirty = false;
                        unsavedNotice.classList.add('hidden');
                        
                        setTimeout(() => {
                            document.getElementById('saveBtn').innerText = originalText;
                            document.getElementById('saveBtn').classList.remove('opacity-50');
                        }, 2000);
                    }, 800);
                }
            });

            document.getElementById('cancelBtn').addEventListener('click', () => {
                if (isDirty) {
                    if(confirm('Discard unsaved changes?')) {
                        form.reset();
                        isDirty = false;
                        unsavedNotice.classList.add('hidden');
                        titleInput.classList.remove('border-error');
                        titleError.classList.add('hidden');
                    }
                } else {
                    // Navigate back or reset
                    form.reset();
                }
            });
        });
    </script>
</body></html>
